<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub — YouTube · Twitch · KICK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --bg:      #0a0a0f;
    --surface: #12121a;
    --surface2:#1a1a26;
    --border:  #2a2a3a;
    --text:    #e8e8f0;
    --muted:   #6b6b88;
    --yt:      #ff2244;
    --tw:      #9147ff;
    --kk:      #53fc18;
    --header-h:50px;
    --cols: 4;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, var(--yt) 0%, var(--tw) 50%, var(--kk) 100%);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  .logo-text { display: none; }

  /* グリッドレイアウトボタン */
  .grid-btns {
    display: flex;
    gap: 4px;
    margin-left: 4px;
  }

  .grid-btn {
    padding: 5px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .grid-btn:hover { color: var(--text); border-color: var(--muted); }
  .grid-btn.active { background: var(--surface2); color: var(--text); border-color: var(--text); }

  .btn-add-cell {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    margin-left: auto;
    flex-shrink: 0;
  }
  .btn-add-cell:hover { color: var(--text); border-color: var(--muted); }

  /* ── GRID ── */
  .grid-wrap {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(var(--cols), 1fr);
    grid-auto-rows: 1fr;
    gap: 1px;
    overflow: hidden;
    background: #000;
    padding: 2px;
  }

  /* ── CELL ── */
  .cell {
    position: relative;
    background: var(--surface);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .cell iframe {
    width: 100%;
    flex: 1;
    border: none;
    display: block;
    min-height: 0;
  }

  /* セルのコントロールバー */
  .cell-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 5px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    min-width: 0;
    overflow: hidden;
  }

  .cell-platform-btn {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all .12s;
    flex-shrink: 0;
  }

  .cell-input {
    flex: 1;
    min-width: 0;
    width: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    padding: 4px 6px;
    outline: none;
  }
  .cell-input:focus { border-color: var(--muted); }
  .cell-input::placeholder { color: var(--muted); }

  .cell-play-btn {
    padding: 4px 7px;
    border-radius: 5px;
    border: none;
    background: var(--yt);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: filter .15s;
    flex-shrink: 0;
  }
  .cell-play-btn:hover { filter: brightness(1.15); }

  .cell-close-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 15px;
    cursor: pointer;
    padding: 2px 3px;
    line-height: 1;
    transition: color .12s;
    flex-shrink: 0;
  }
  .cell-close-btn:hover { color: #ff6b6b; }

  /* 空セル（プレースホルダー） */
  .cell-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #000;
    cursor: pointer;
  }

  .cell-empty-icon { font-size: 28px; opacity: .15; }

  .cell-empty-text {
    font-size: 11px;
    color: var(--muted);
    opacity: .7;
  }

  /* プラットフォームセレクター */
  .platform-selector {
    display: none;
    position: absolute;
    bottom: 38px;
    left: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    z-index: 50;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  .platform-selector.open { display: block; }

  .ps-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s;
    white-space: nowrap;
  }
  .ps-item:hover { background: var(--surface2); }

  /* 全画面セル */
  .cell.fullscreen {
    position: fixed;
    inset: 0;
    z-index: 200;
    border-radius: 0;
  }

  /* レスポンシブ */
  /* レスポンシブはJS側で制御 */

</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">▶</div>
    <span class="logo-text">StreamHub</span>
  </div>

  <div class="grid-btns">
    <button class="grid-btn" onclick="setGrid(1)">１</button>
    <button class="grid-btn" onclick="setGrid(4)">２×２</button>
    <button class="grid-btn active" onclick="setGrid(8)">２×４</button>
  </div>

  <button class="btn-add-cell" onclick="addCell()">＋ 追加</button>
</header>

<div class="grid-wrap" id="grid-wrap"></div>

<script>
// ───────────────────────────────────────────────
// STATE
// ───────────────────────────────────────────────
const STORAGE_KEY = 'sh_grid_v1';

const PLATFORM_CONFIG = {
  yt: { label: 'YT', color: '#ff2244', bg: 'rgba(255,34,68,.15)', name: 'YouTube' },
  tw: { label: 'TW', color: '#9147ff', bg: 'rgba(145,71,255,.15)', name: 'Twitch' },
  kk: { label: 'KK', color: '#53fc18', bg: 'rgba(83,252,24,.12)',  name: 'KICK' },
};

let cells = loadCells();
let currentCols = 4;

// ───────────────────────────────────────────────
// STORAGE
// ───────────────────────────────────────────────
function loadCells() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch {}
  // デフォルト: 4セル空
  // デフォルト: 2×2 = 4セル
  return Array.from({length: 4}, () => ({ id: uid(), platform: 'yt', url: '', playing: false }));
}

function saveCells() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(
    cells.map(c => ({ id: c.id, platform: c.platform, url: c.url, playing: false }))
  ));
}

function uid() {
  return Math.random().toString(36).slice(2, 9);
}

// ───────────────────────────────────────────────
// GRID LAYOUT
// ───────────────────────────────────────────────
// layout: { cols, cells }
const GRID_LAYOUTS = {
  1:  { cols: 1, count: 1  },
  4:  { cols: 2, count: 4  },
  8:  { cols: 2, count: 8  },
};

function setGrid(n) {
  currentCols = n;
  const layout = GRID_LAYOUTS[n] || { cols: 2, count: n };
  document.documentElement.style.setProperty('--cols', layout.cols);

  // セル数を調整
  while (cells.length < layout.count) cells.push({ id: uid(), platform: 'yt', url: '', playing: false });
  cells = cells.slice(0, layout.count);

  document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  renderGrid();
  saveCells();
}

function addCell() {
  cells.push({ id: uid(), platform: 'yt', url: '', playing: false });
  // カラム数はそのまま（grid-auto-rowsで自動）
  renderGrid();
  saveCells();
}

// ───────────────────────────────────────────────
// RENDER
// ───────────────────────────────────────────────
function renderGrid() {
  const wrap = document.getElementById('grid-wrap');
  wrap.innerHTML = '';
  cells.forEach((cell, i) => {
    wrap.appendChild(buildCell(cell, i));
  });
}

function buildCell(cell, i) {
  const div = document.createElement('div');
  div.className = 'cell';
  div.id = 'cell-' + cell.id;

  const pc = PLATFORM_CONFIG[cell.platform];

  // 空セル or プレイヤー
  const playerArea = document.createElement('div');
  playerArea.className = 'cell-empty';
  playerArea.onclick = () => focusInput(cell.id);
  playerArea.innerHTML = `<div class="cell-empty-icon">📺</div><div class="cell-empty-text">URLを入力して再生</div>`;
  div.appendChild(playerArea);

  // コントロールバー
  const bar = document.createElement('div');
  bar.className = 'cell-bar';

  // プラットフォームボタン
  const platBtn = document.createElement('button');
  platBtn.className = 'cell-platform-btn';
  platBtn.style.background = pc.bg;
  platBtn.style.color = pc.color;
  platBtn.textContent = pc.label;
  platBtn.onclick = () => togglePlatformSelector(cell.id);

  // プラットフォームセレクター
  const selector = document.createElement('div');
  selector.className = 'platform-selector';
  selector.id = 'ps-' + cell.id;
  Object.entries(PLATFORM_CONFIG).forEach(([key, cfg]) => {
    const item = document.createElement('div');
    item.className = 'ps-item';
    item.innerHTML = `<span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px;background:${cfg.bg};color:${cfg.color}">${cfg.label}</span>${cfg.name}`;
    item.onclick = (e) => { e.stopPropagation(); selectPlatform(cell.id, key); };
    selector.appendChild(item);
  });
  div.appendChild(selector);

  // URL入力
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.type = 'text';
  input.placeholder = 'URLを入力';
  input.id = 'input-' + cell.id;
  input.value = cell.url || '';
  input.onkeydown = (e) => { if (e.key === 'Enter') playCell(cell.id); };

  // 再生ボタン
  const playBtn = document.createElement('button');
  playBtn.className = 'cell-play-btn';
  playBtn.style.background = pc.color;
  playBtn.textContent = '▶';
  playBtn.onclick = () => playCell(cell.id);

  // 閉じるボタン
  const closeBtn = document.createElement('button');
  closeBtn.className = 'cell-close-btn';
  closeBtn.textContent = '✕';
  closeBtn.onclick = () => removeCell(cell.id);

  bar.appendChild(platBtn);
  bar.appendChild(input);
  bar.appendChild(playBtn);
  bar.appendChild(closeBtn);
  div.appendChild(bar);

  return div;
}

// ───────────────────────────────────────────────
// CELL ACTIONS
// ───────────────────────────────────────────────
function focusInput(id) {
  const el = document.getElementById('input-' + id);
  if (el) el.focus();
}

function togglePlatformSelector(id) {
  // 他を閉じる
  document.querySelectorAll('.platform-selector').forEach(s => {
    if (s.id !== 'ps-' + id) s.classList.remove('open');
  });
  document.getElementById('ps-' + id).classList.toggle('open');
}

function selectPlatform(id, platform) {
  const cell = cells.find(c => c.id === id);
  if (!cell) return;
  cell.platform = platform;
  document.getElementById('ps-' + id).classList.remove('open');
  saveCells();
  renderGrid();
}

function playCell(id) {
  const cell = cells.find(c => c.id === id);
  if (!cell) return;
  const input = document.getElementById('input-' + id);
  const raw = input ? input.value.trim() : cell.url;
  if (!raw) return;

  cell.url = raw;
  saveCells();

  const embedUrl = buildEmbedUrl(cell.platform, raw);
  if (!embedUrl) return;

  const cellEl = document.getElementById('cell-' + id);
  const playerArea = cellEl.querySelector('.cell-empty');

  if (cell.platform === 'tw') {
    // Twitchは外部リンクパネル
    const ch = extractTwitchChannel(raw);
    playerArea.innerHTML = `
      <div style="font-size:22px">🟣</div>
      <div style="font-size:14px;font-weight:700;color:#9147ff">Twitch</div>
      <div style="font-size:13px;opacity:.8">${ch}</div>
      <a href="https://twitch.tv/${ch}" target="_blank" rel="noopener"
         style="margin-top:6px;padding:9px 20px;border-radius:8px;background:#9147ff;color:#fff;font-size:13px;font-weight:700;text-decoration:none">▶ 開く</a>
    `;
    playerArea.onclick = null;
    return;
  }

  // iframe再生
  const iframe = document.createElement('iframe');
  iframe.src = embedUrl;
  iframe.allowFullscreen = true;
  iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
  iframe.style.cssText = 'width:100%;flex:1;border:none;display:block;min-height:0';

  playerArea.replaceWith(iframe);
}

function removeCell(id) {
  if (cells.length <= 1) return;
  cells = cells.filter(c => c.id !== id);
  saveCells();
  renderGrid();
}

// ───────────────────────────────────────────────
// URL BUILDERS
// ───────────────────────────────────────────────
function buildEmbedUrl(platform, input) {
  if (platform === 'yt') {
    const vid = extractYouTubeId(input);
    if (vid) return `https://www.youtube.com/embed/${vid}?autoplay=1&rel=0`;
    const ch = extractYouTubeChannel(input);
    const clean = ch || input.replace(/^@/, '').trim();
    return `https://www.youtube.com/embed/live_stream?channel=${clean}&autoplay=1`;
  }
  if (platform === 'tw') return null; // 外部パネル
  if (platform === 'kk') {
    const ch = extractKickChannel(input);
    return `https://player.kick.com/${ch}?autoplay=true`;
  }
  return null;
}

function extractYouTubeId(s) {
  const m = s.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function extractYouTubeChannel(s) {
  const m = s.match(/youtube\.com\/(?:channel\/|@)([^/?&#]+)/);
  return m ? m[1] : null;
}

function extractTwitchChannel(s) {
  const m = s.match(/twitch\.tv\/([^/?&#]+)/);
  return m ? m[1] : s.replace(/https?:\/\//,'').replace(/twitch\.tv\//,'').split('/')[0].split('?')[0];
}

function extractKickChannel(s) {
  const m = s.match(/kick\.com\/([^/?&#]+)/);
  return m ? m[1] : s.replace(/https?:\/\//,'').replace(/kick\.com\//,'').split('/')[0].split('?')[0];
}

// ───────────────────────────────────────────────
// CLOSE SELECTORS ON OUTSIDE CLICK
// ───────────────────────────────────────────────
document.addEventListener('click', () => {
  document.querySelectorAll('.platform-selector').forEach(s => s.classList.remove('open'));
});

// ───────────────────────────────────────────────
// INIT
// ───────────────────────────────────────────────
renderGrid();
</script>
</body>
</html>
