<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub — YouTube · Twitch · KICK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --bg:       #0a0a0f;
    --surface:  #12121a;
    --surface2: #1a1a26;
    --border:   #2a2a3a;
    --text:     #e8e8f0;
    --muted:    #6b6b88;
    --yt:       #ff2244;
    --tw:       #9147ff;
    --kk:       #53fc18;
    --active-glow: var(--yt);
    --sidebar-w: 260px;
    --header-h:  52px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--yt) 0%, var(--tw) 50%, var(--kk) 100%);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }



  /* Search bar */
  .search-wrap {
    flex: 1;
    max-width: 640px;
    margin-left: auto;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 7px 36px 7px 14px;
    outline: none;
    transition: border-color .15s;
  }

  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--active-glow); }

  .search-wrap .search-hint {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
  }

  .btn-go {
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    background: var(--yt);
    color: #fff;
    white-space: nowrap;
  }

  .btn-go:hover { filter: brightness(1.15); }

  /* ── BODY ── */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  aside {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-section {
    padding: 14px 12px 6px;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 4px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sidebar-label .bar {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 8px;
    border-radius: 7px;
    cursor: pointer;
    transition: background .12s;
    position: relative;
  }

  .channel-item:hover { background: var(--surface2); }
  .channel-item.active { background: var(--surface2); }

  .channel-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; height: 60%;
    width: 2px;
    border-radius: 2px;
    background: var(--active-glow);
  }

  .ch-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    border: 2px solid transparent;
  }

  .ch-info { flex: 1; min-width: 0; }
  .ch-name {
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ch-sub {
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ch-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  /* yt colors */
  .yt .ch-avatar { background: rgba(255,34,68,.15); color: var(--yt); border-color: rgba(255,34,68,.2); }
  .yt.active::before, .yt .active-bar { background: var(--yt); }
  .yt .ch-badge { background: rgba(255,34,68,.15); color: var(--yt); }

  /* tw colors */
  .tw .ch-avatar { background: rgba(145,71,255,.15); color: var(--tw); border-color: rgba(145,71,255,.2); }
  .tw.active::before { background: var(--tw); }
  .tw .ch-badge { background: rgba(145,71,255,.15); color: var(--tw); }

  /* kk colors */
  .kk .ch-avatar { background: rgba(83,252,24,.12); color: var(--kk); border-color: rgba(83,252,24,.2); }
  .kk.active::before { background: var(--kk); }
  .kk .ch-badge { background: rgba(83,252,24,.12); color: var(--kk); }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* Platform glow bar */
  .platform-bar {
    height: 3px;
    background: var(--yt);
    transition: background .3s;
    flex-shrink: 0;
  }

  /* Player area */
  .player-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    max-height: calc(100dvh - var(--header-h) - 3px - 120px);
    background: #000;
    flex-shrink: 0;
  }

  .player-wrap iframe {
    width: 100%; height: 100%;
    border: none;
    display: block;
  }

  .player-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: #000;
  }

  .placeholder-icon {
    font-size: 56px;
    opacity: .15;
  }

  .placeholder-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--muted);
  }

  .placeholder-sub {
    font-size: 13px;
    color: var(--muted);
    opacity: .6;
  }

  /* Info bar below player */
  .now-info {
    padding: 10px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .now-platform {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: .5px;
  }

  .now-platform.yt { background: rgba(255,34,68,.15); color: var(--yt); }
  .now-platform.tw { background: rgba(145,71,255,.15); color: var(--tw); }
  .now-platform.kk { background: rgba(83,252,24,.12);  color: var(--kk); }

  .now-title {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .now-meta {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .ext-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    text-decoration: none;
    transition: all .15s;
    white-space: nowrap;
  }

  .ext-btn:hover { border-color: var(--text); color: var(--text); }

  /* Recents row */
  .recents-row {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .recents-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }

  .history-item:hover { border-color: var(--muted); background: var(--surface2); }

  .history-pill {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .history-pill.yt { background: rgba(255,34,68,.15); color: var(--yt); }
  .history-pill.tw { background: rgba(145,71,255,.15); color: var(--tw); }
  .history-pill.kk { background: rgba(83,252,24,.12);  color: var(--kk); }

  .history-text {
    font-size: 13px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
    opacity: 0;
    transition: opacity .12s;
  }

  .history-item:hover .history-remove { opacity: 1; }

  /* ── EXTERNAL PANEL ── */
  .ext-panel {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px 24px;
  }

  .ext-panel-logo svg { filter: drop-shadow(0 0 20px currentColor); }

  .ext-panel-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .ext-panel-channel {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    opacity: .85;
  }

  .ext-panel-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px 36px;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 700;
    text-decoration: none;
    margin-top: 8px;
    transition: filter .15s, transform .12s;
    box-shadow: 0 4px 24px rgba(0,0,0,.4);
  }

  .ext-panel-btn:hover  { filter: brightness(1.12); }
  .ext-panel-btn:active { transform: scale(.97); }

  .ext-panel-note {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    max-width: 280px;
    line-height: 1.6;
    opacity: .7;
  }

  /* Sidebar toggle on mobile */
  .sidebar-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }


  /* ── PiP / MEDIA CONTROLS ── */
  .media-controls {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
  }

  .mc-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }

  .mc-btn:hover { border-color: var(--muted); background: var(--border); }
  .mc-btn:active { transform: scale(.97); }
  .mc-btn.active { border-color: var(--yt); color: var(--yt); background: rgba(255,34,68,.08); }

  .mc-label {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    line-height: 1.4;
    text-align: right;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    :root { --sidebar-w: 220px; }
    aside { position: absolute; left: -100%; top: var(--header-h); bottom: 0; z-index: 50; transition: left .22s; }
    aside.open { left: 0; }
    .sidebar-toggle { display: flex; }
    .search-wrap { max-width: 180px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <button class="sidebar-toggle" onclick="toggleSidebar()" title="サイドバー">☰</button>
  <div class="logo">
    <div class="logo-icon">▶</div>
    StreamHub
  </div>



  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="URLまたはチャンネル名を入力..." onkeydown="handleKey(event)">
    <span class="search-hint">Enter ↵</span>
  </div>
  <button class="btn-go" id="btn-go" onclick="loadFromSearch()">再生</button>
</header>

<!-- BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <aside id="sidebar">

    <!-- YouTube -->
    <div class="sidebar-section">
      <div class="sidebar-label">
        YouTube
        <span class="bar"></span>
      </div>
      <div id="yt-channels"></div>
    </div>

    <!-- Twitch -->
    <div class="sidebar-section">
      <div class="sidebar-label">
        Twitch
        <span class="bar"></span>
      </div>
      <div id="tw-channels"></div>
    </div>

    <!-- KICK -->
    <div class="sidebar-section">
      <div class="sidebar-label">
        KICK
        <span class="bar"></span>
      </div>
      <div id="kk-channels"></div>
    </div>

  </aside>

  <!-- MAIN CONTENT -->
  <main>
    <div class="platform-bar" id="platform-bar"></div>

    <div class="player-wrap" id="player-wrap">
      <div class="player-placeholder" id="placeholder">
        <div class="placeholder-icon">📺</div>
        <div class="placeholder-title">StreamHub</div>
        <div class="placeholder-sub">URLまたはチャンネル名を入力して再生</div>
      </div>
      <!-- iframe はここに動的生成 -->
    </div>

    <div class="now-info" id="now-info" style="display:none">
      <span class="now-platform" id="now-platform-badge">YT</span>
      <span class="now-title" id="now-title">—</span>
      <span class="now-meta" id="now-meta"></span>
      <a class="ext-btn" id="ext-link" href="#" target="_blank" rel="noopener">↗ 開く</a>
    </div>

    <div class="media-controls" id="media-controls" style="display:none">
      <button class="mc-btn" id="btn-pip" onclick="requestPiP()" title="ピクチャーインピクチャー">
        ⧉ PiP
      </button>
      <button class="mc-btn" id="btn-bg" onclick="toggleBackground()" title="バックグラウンド再生">
        ⏯ バックグラウンド
      </button>
      <span class="mc-label" id="mc-hint">画面を切り替えても再生を続けます</span>
    </div>

    <div class="recents-row" id="recents-row">
      <div class="recents-label">履歴</div>
      <div id="history-list"></div>
    </div>
  </main>
</div>

<script>
// ───────────────────────────────────────────────
// STATE
// ───────────────────────────────────────────────
let currentPlatform = 'yt';
let currentContent  = null;

const STORAGE_KEY_HISTORY  = 'sh_history_v1';
const STORAGE_KEY_CHANNELS = 'sh_channels_v1';

// デフォルトチャンネルリスト
const DEFAULT_CHANNELS = {
  yt: [
    { id: 'UCFo3UKY_pI3dlf0GJpWq1ww', name: 'NHKニュース',   sub: 'ニュース' },
    { id: 'UCWX3yGbODI3HLqSXqMBIzOA', name: 'ABEMA News',     sub: 'ニュース/エンタメ' },
    { id: 'UCnUYZLuoy1rq1aVMwx4aTzw', name: 'GEMS COMPANY',   sub: 'バーチャルアイドル' },
  ],
  tw: [
    { id: 'shroud',    name: 'shroud',    sub: 'FPS / Variety' },
    { id: 'ninja',     name: 'Ninja',     sub: 'Fortnite / Variety' },
    { id: 'pokimane',  name: 'pokimane',  sub: 'Just Chatting' },
  ],
  kk: [
    { id: 'xqc',       name: 'xQc',       sub: 'Just Chatting' },
    { id: 'trainwreckstv', name: 'Trainwreck', sub: 'Casino / Variety' },
    { id: 'destiny',   name: 'Destiny',   sub: 'Politics / Games' },
  ],
};

// ───────────────────────────────────────────────
// INIT
// ───────────────────────────────────────────────
function init() {
  renderSidebar();
  renderHistory();
  updatePlatformUI();
}

// ───────────────────────────────────────────────
// PLATFORM SWITCH
// ───────────────────────────────────────────────
function switchPlatform(p) {
  currentPlatform = p;
  updatePlatformUI();
}

function updatePlatformUI() {
  const colors = { yt: '#ff2244', tw: '#9147ff', kk: '#53fc18' };
  const labels = { yt: 'YouTube', tw: 'Twitch', kk: 'KICK' };

  document.getElementById('platform-bar').style.background = colors[currentPlatform];
  document.getElementById('btn-go').style.background = colors[currentPlatform];



  // placeholder text update
  const ph = document.getElementById('placeholder');
  if (ph) {
    ph.querySelector('.placeholder-title').textContent = labels[currentPlatform];
    ph.querySelector('.placeholder-sub').textContent =
      currentPlatform === 'yt' ? 'YouTube URLまたはチャンネルIDを入力' :
      currentPlatform === 'tw' ? 'Twitch チャンネル名を入力' :
      'KICK チャンネル名を入力';
  }

  // search hint
  document.getElementById('search-input').placeholder =
    currentPlatform === 'yt' ? 'YouTube URL / チャンネルID' :
    currentPlatform === 'tw' ? 'Twitch チャンネル名' :
    'KICK チャンネル名';
}

// ───────────────────────────────────────────────
// LOAD CONTENT
// ───────────────────────────────────────────────
function loadFromSearch() {
  const raw = document.getElementById('search-input').value.trim();
  if (!raw) return;
  loadContent(currentPlatform, raw);
}

function handleKey(e) {
  if (e.key === 'Enter') loadFromSearch();
}

function loadChannel(platform, id) {
  currentPlatform = platform;
  updatePlatformUI();
  loadContent(platform, id);
}

function loadContent(platform, input) {
  let embedUrl = '';
  let displayTitle = input;
  let extUrl = '';

  if (platform === 'yt') {
    const vid = extractYouTubeId(input);
    const ch  = extractYouTubeChannel(input);
    if (vid) {
      embedUrl = `https://www.youtube.com/embed/${vid}?autoplay=1&rel=0`;
      extUrl   = `https://www.youtube.com/watch?v=${vid}`;
      displayTitle = `YouTube 動画: ${vid}`;
    } else if (ch) {
      embedUrl = `https://www.youtube.com/embed/live_stream?channel=${ch}&autoplay=1`;
      extUrl   = `https://www.youtube.com/channel/${ch}`;
      displayTitle = `YouTube チャンネル: ${ch}`;
    } else {
      // Treat as channel id directly
      const clean = input.replace(/^@/, '');
      embedUrl = `https://www.youtube.com/embed/live_stream?channel=${clean}&autoplay=1`;
      extUrl   = `https://www.youtube.com/@${clean}`;
      displayTitle = `YouTube: ${clean}`;
    }
  } else if (platform === 'tw') {
    const ch = extractTwitchChannel(input);
    extUrl   = `https://twitch.tv/${ch}`;
    displayTitle = `Twitch: ${ch}`;
    showExternalPanel('tw', ch, extUrl);
    addHistory(platform, input, displayTitle);
    document.getElementById('search-input').value = '';
    document.getElementById('sidebar').classList.remove('open');
    currentContent = { platform, input, displayTitle, extUrl };
    return;
  } else if (platform === 'kk') {
    const ch = extractKickChannel(input);
    embedUrl = `https://player.kick.com/${ch}?autoplay=true`;
    extUrl   = `https://kick.com/${ch}`;
    displayTitle = `KICK: ${ch}`;
  }

  if (!embedUrl) return;

  // Build iframe (YouTube only)
  const wrap = document.getElementById('player-wrap');
  wrap.innerHTML = `<iframe id="main-iframe" src="${embedUrl}" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture; web-share"></iframe>`;
  // PiP・バックグラウンド再生ボタンを表示
  showMediaControls();

  // Now info
  document.getElementById('now-info').style.display = 'flex';
  const badge = document.getElementById('now-platform-badge');
  badge.className = 'now-platform ' + platform;
  badge.textContent = platform.toUpperCase();
  document.getElementById('now-title').textContent = displayTitle;
  document.getElementById('now-meta').textContent  = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
  document.getElementById('ext-link').href = extUrl;

  // Save history
  addHistory(platform, input, displayTitle);

  // Clear search
  document.getElementById('search-input').value = '';

  // Close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');

  currentContent = { platform, input, displayTitle, extUrl };
}

// ───────────────────────────────────────────────
// EXTERNAL PANEL (Twitch / KICK — iframe不可のため)
// ───────────────────────────────────────────────
function showExternalPanel(platform, channelName, url) {
  const colors   = { tw: '#9147ff', kk: '#53fc18' };
  const bgColors = { tw: 'rgba(145,71,255,0.08)', kk: 'rgba(83,252,24,0.06)' };
  const names    = { tw: 'Twitch', kk: 'KICK' };
  const logos    = {
    tw: `<svg width="40" height="40" viewBox="0 0 24 24" fill="#9147ff"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>`,
    kk: `<svg width="40" height="40" viewBox="0 0 24 24" fill="#53fc18"><path d="M16.247 0H7.753L0 13l7.753 11h8.494L24 13z"/></svg>`
  };
  const color  = colors[platform];
  const wrap   = document.getElementById('player-wrap');

  wrap.innerHTML = `
    <div class="ext-panel" style="background:radial-gradient(ellipse at center, ${bgColors[platform]} 0%, #000 70%)">
      <div class="ext-panel-logo">${logos[platform]}</div>
      <div class="ext-panel-name" style="color:${color}">${names[platform]}</div>
      <div class="ext-panel-channel">${channelName}</div>
      <a class="ext-panel-btn" href="${url}" target="_blank" rel="noopener"
         style="background:${color};color:${platform==='kk'?'#000':'#fff'}">
        ▶ ${names[platform]} で視聴する
      </a>
      <div class="ext-panel-note">埋め込み非対応のためアプリまたはブラウザで開きます</div>
    </div>
  `;

  document.getElementById('now-info').style.display = 'flex';
  const badge = document.getElementById('now-platform-badge');
  badge.className = 'now-platform ' + platform;
  badge.textContent = platform.toUpperCase();
  document.getElementById('now-title').textContent = `${names[platform]}: ${channelName}`;
  document.getElementById('now-meta').textContent  = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('ext-link').href = url;
}


// ───────────────────────────────────────────────
function extractYouTubeId(s) {
  const m = s.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function extractYouTubeChannel(s) {
  const m = s.match(/youtube\.com\/(?:channel\/|@)([^/?&#]+)/);
  return m ? m[1] : null;
}

function extractTwitchChannel(s) {
  const m = s.match(/twitch\.tv\/([^/?&#]+)/);
  return m ? m[1] : s.replace('https://','').replace('twitch.tv/','').split('/')[0];
}

function extractKickChannel(s) {
  const m = s.match(/kick\.com\/([^/?&#]+)/);
  return m ? m[1] : s.replace('https://','').replace('kick.com/','').split('/')[0];
}

// ───────────────────────────────────────────────
// SIDEBAR
// ───────────────────────────────────────────────
const EMOJIS = {
  yt: ['📺','🎬','🎥','📡','🎙','🎵','📰','🎮'],
  tw: ['🎮','🃏','🏆','👾','🕹','🔫','⚔️','🧙'],
  kk: ['🎰','🎯','🏅','🎲','🎬','🎪','🔥','💫'],
};

function renderSidebar() {
  const channels = getChannels();
  const sections = { yt: '#yt-channels', tw: '#tw-channels', kk: '#kk-channels' };
  const labels   = { yt: 'YT', tw: 'TW', kk: 'KK' };
  const colorClass = { yt: 'yt', tw: 'tw', kk: 'kk' };

  for (const [p, selector] of Object.entries(sections)) {
    const el = document.querySelector(selector);
    el.innerHTML = '';
    (channels[p] || []).forEach((ch, i) => {
      const div = document.createElement('div');
      div.className = `channel-item ${colorClass[p]}`;
      div.innerHTML = `
        <div class="ch-avatar">${EMOJIS[p][i % EMOJIS[p].length]}</div>
        <div class="ch-info">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-sub">${ch.sub || ''}</div>
        </div>
        <span class="ch-badge">${labels[p]}</span>
      `;
      div.onclick = () => loadChannel(p, ch.id);
      el.appendChild(div);
    });

    // Add custom channel button
    const addBtn = document.createElement('div');
    addBtn.className = 'channel-item';
    addBtn.style.opacity = '.5';
    addBtn.innerHTML = `<div class="ch-avatar" style="background:var(--surface2);font-size:16px">＋</div><div class="ch-info"><div class="ch-name">追加...</div></div>`;
    addBtn.onclick = () => promptAddChannel(p);
    el.appendChild(addBtn);
  }
}

function promptAddChannel(p) {
  const labels = { yt: 'YouTube チャンネルID または URL', tw: 'Twitch チャンネル名', kk: 'KICK チャンネル名' };
  const val = prompt(labels[p]);
  if (!val) return;
  const name = prompt('表示名:');
  if (!name) return;

  const channels = getChannels();
  channels[p].push({ id: val.trim(), name: name.trim(), sub: '' });
  saveChannels(channels);
  renderSidebar();
}

// ───────────────────────────────────────────────
// HISTORY
// ───────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY_HISTORY) || '[]'); } catch { return []; }
}

function addHistory(platform, input, title) {
  let h = getHistory();
  h = h.filter(x => !(x.platform === platform && x.input === input));
  h.unshift({ platform, input, title, ts: Date.now() });
  if (h.length > 30) h = h.slice(0, 30);
  localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(h));
  renderHistory();
}

function removeHistory(i) {
  let h = getHistory();
  h.splice(i, 1);
  localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(h));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const h = getHistory();
  if (!h.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:4px 0">まだ履歴がありません</div>';
    return;
  }
  list.innerHTML = '';
  h.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <span class="history-pill ${item.platform}">${item.platform.toUpperCase()}</span>
      <span class="history-text">${item.title}</span>
      <button class="history-remove" onclick="event.stopPropagation();removeHistory(${i})" title="削除">✕</button>
    `;
    div.onclick = () => loadContent(item.platform, item.input);
    list.appendChild(div);
  });
}

// ───────────────────────────────────────────────
// CHANNELS STORAGE
// ───────────────────────────────────────────────
function getChannels() {
  try {
    const s = localStorage.getItem(STORAGE_KEY_CHANNELS);
    return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_CHANNELS));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_CHANNELS)); }
}

function saveChannels(c) {
  localStorage.setItem(STORAGE_KEY_CHANNELS, JSON.stringify(c));
}

// SIDEBAR TOGGLE (mobile)
// ───────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}


// ───────────────────────────────────────────────
// MEDIA CONTROLS: PiP & バックグラウンド再生
// ───────────────────────────────────────────────
function showMediaControls() {
  document.getElementById('media-controls').style.display = 'flex';
}

async function requestPiP() {
  const iframe = document.getElementById('main-iframe');
  if (!iframe) return;

  // iframeのvideoタグへのアクセスはクロスオリジンで不可のため
  // ブラウザネイティブPiPを試みる（YouTube/KICKはiframe内で対応）
  try {
    // Chrome Android: document.pictureInPictureElement
    if (document.pictureInPictureEnabled) {
      // iframeの動画はクロスオリジンのためdirect PiP不可
      // → フルスクリーン後にPiPボタンを案内
      alert('PiP手順：
①フルスクリーンボタンをタップ
②プレイヤー内のPiPアイコンをタップ
（YouTubeはアプリが必要な場合があります）');
    } else {
      showPiPFallback();
    }
  } catch(e) {
    showPiPFallback();
  }
}

function showPiPFallback() {
  const hint = document.getElementById('mc-hint');
  hint.textContent = 'プレイヤー内のPiPボタンをタップしてください';
  hint.style.color = 'var(--kk)';
}

let bgWakeLock = null;

async function toggleBackground() {
  const btn = document.getElementById('btn-bg');

  // Wake Lock APIでスリープを防止
  if (bgWakeLock) {
    try { await bgWakeLock.release(); } catch(e) {}
    bgWakeLock = null;
    btn.classList.remove('active');
    btn.textContent = '⏯ バックグラウンド';
    document.getElementById('mc-hint').textContent = '画面を切り替えても再生を続けます';
    document.getElementById('mc-hint').style.color = '';
    return;
  }

  try {
    if ('wakeLock' in navigator) {
      bgWakeLock = await navigator.wakeLock.request('screen');
      btn.classList.add('active');
      btn.textContent = '⏹ 解除';
      const hint = document.getElementById('mc-hint');
      hint.textContent = 'スリープ防止中 — 画面OFF時はアプリで開いてください';
      hint.style.color = 'var(--kk)';

      bgWakeLock.addEventListener('release', () => {
        bgWakeLock = null;
        btn.classList.remove('active');
        btn.textContent = '⏯ バックグラウンド';
      });
    } else {
      // Wake Lock非対応ブラウザ向けフォールバック
      const hint = document.getElementById('mc-hint');
      hint.textContent = 'このブラウザは非対応です。Chromeをお試しください。';
      hint.style.color = '#ff6b6b';
    }
  } catch(e) {
    const hint = document.getElementById('mc-hint');
    hint.textContent = '有効化できませんでした: ' + e.message;
    hint.style.color = '#ff6b6b';
  }
}

// ページ表示復帰時にWakeLockを再取得
document.addEventListener('visibilitychange', async () => {
  if (bgWakeLock !== null && document.visibilityState === 'visible') {
    try {
      bgWakeLock = await navigator.wakeLock.request('screen');
    } catch(e) {}
  }
});

init();
