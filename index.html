<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub — YouTube · Twitch · KICK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --bg:      #0a0a0f;
    --surface: #12121a;
    --surface2:#1a1a26;
    --border:  #2a2a3a;
    --text:    #e8e8f0;
    --muted:   #6b6b88;
    --yt:      #ff2244;
    --tw:      #9147ff;
    --kk:      #53fc18;
    --header-h:50px;
    --cols: 4;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, var(--yt) 0%, var(--tw) 50%, var(--kk) 100%);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  .logo-text { display: none; }

  /* グリッドレイアウトボタン */
  .grid-btns {
    display: flex;
    gap: 4px;
    margin-left: 4px;
  }

  .grid-btn {
    padding: 5px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .grid-btn:hover { color: var(--text); border-color: var(--muted); }
  .grid-btn.active { background: var(--surface2); color: var(--text); border-color: var(--text); }

  .btn-add-cell {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    margin-left: auto;
    flex-shrink: 0;
  }
  .btn-add-cell:hover { color: var(--text); border-color: var(--muted); }

  /* ── GRID ── */
  .grid-wrap {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(var(--cols), 1fr);
    grid-auto-rows: 1fr;
    gap: 1px;
    overflow: hidden;
    background: #000;
    padding: 2px;
  }

  /* ── CELL ── */
  .cell {
    position: relative;
    background: var(--surface);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .cell iframe {
    width: 100%;
    flex: 1;
    border: none;
    display: block;
    min-height: 0;
  }

  /* セルのコントロールバー */
  .cell-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 5px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    min-width: 0;
    overflow: hidden;
  }

  .cell-platform-btn {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all .12s;
    flex-shrink: 0;
  }

  .cell-input {
    flex: 1;
    min-width: 0;
    width: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    padding: 4px 6px;
    outline: none;
  }
  .cell-input:focus { border-color: var(--muted); }
  .cell-input::placeholder { color: var(--muted); }

  .cell-play-btn {
    padding: 4px 7px;
    border-radius: 5px;
    border: none;
    background: var(--yt);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: filter .15s;
    flex-shrink: 0;
  }
  .cell-play-btn:hover { filter: brightness(1.15); }

  .cell-close-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 15px;
    cursor: pointer;
    padding: 2px 3px;
    line-height: 1;
    transition: color .12s;
    flex-shrink: 0;
  }
  .cell-close-btn:hover { color: #ff6b6b; }

  /* 空セル（プレースホルダー） */
  .cell-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #000;
    cursor: pointer;
  }

  .cell-empty-icon { font-size: 28px; opacity: .15; }

  .cell-empty-text {
    font-size: 11px;
    color: var(--muted);
    opacity: .7;
  }

  /* プラットフォームセレクター */
  .platform-selector {
    display: none;
    position: absolute;
    bottom: 38px;
    left: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    z-index: 50;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  .platform-selector.open { display: block; }

  .ps-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s;
    white-space: nowrap;
  }
  .ps-item:hover { background: var(--surface2); }

  /* レスポンシブ */
  /* レスポンシブはJS側で制御 */

</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">▶</div>
    <span class="logo-text">StreamHub</span>
  </div>

  <div class="grid-btns">
    <button class="grid-btn active" onclick="setGrid(4)">4画面</button>
  </div>

  <button class="btn-add-cell" onclick="addCell()">＋ 追加</button>
</header>

<div class="grid-wrap" id="grid-wrap"></div>

<script>
// ───────────────────────────────────────────────
// STATE
// ───────────────────────────────────────────────
const STORAGE_KEY = 'sh_grid_v3';

const PLATFORM_CONFIG = {
  yt: { label: 'YT', color: '#ff2244', bg: 'rgba(255,34,68,.15)', name: 'YouTube' },
  tw: { label: 'TW', color: '#9147ff', bg: 'rgba(145,71,255,.15)', name: 'Twitch' },
  kk: { label: 'KK', color: '#53fc18', bg: 'rgba(83,252,24,.12)',  name: 'KICK' },
};

let cells = loadCells();
let currentCols = 4;

// ───────────────────────────────────────────────
// STORAGE
// ───────────────────────────────────────────────
function loadCells() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch {}
  // デフォルト: 4セル空
  // デフォルト: KICKチャンネル4つ
  return [
    { id: uid(), platform: 'kk', url: 'https://kick.com/ponchan_2525', displayName: 'ponchan_2525' },
    { id: uid(), platform: 'kk', url: 'https://kick.com/toromi2525',   displayName: 'toromi2525'   },
    { id: uid(), platform: 'kk', url: 'https://kick.com/mikachin',     displayName: 'mikachin'     },
    { id: uid(), platform: 'kk', url: 'https://kick.com/yuki_0121',    displayName: 'yuki_0121'    },
  ];
}

function saveCells() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(
    cells.map(c => ({ id: c.id, platform: c.platform, url: c.url, playing: false }))
  ));
}

function uid() {
  return Math.random().toString(36).slice(2, 9);
}

// ───────────────────────────────────────────────
// GRID LAYOUT
// ───────────────────────────────────────────────
// layout: { cols, cells }
const GRID_LAYOUTS = {
  4:  { cols: 2, count: 4  },
};

function setGrid(n) {
  currentCols = n;
  const layout = GRID_LAYOUTS[n] || { cols: 2, count: n };
  document.documentElement.style.setProperty('--cols', layout.cols);

  // セル数を調整
  while (cells.length < layout.count) cells.push({ id: uid(), platform: 'yt', url: '', playing: false });
  cells = cells.slice(0, layout.count);

  document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  renderGrid();
  saveCells();
}

function addCell() {
  const cell = { id: uid(), platform: 'yt', url: '', playing: false };
  cells.push(cell);
  saveCells();
  const wrap = document.getElementById('grid-wrap');
  wrap.appendChild(buildCell(cell, cells.length - 1));
}

// ───────────────────────────────────────────────
// RENDER
// ───────────────────────────────────────────────
function renderGrid() {
  const wrap = document.getElementById('grid-wrap');
  wrap.innerHTML = '';
  cells.forEach((cell, i) => {
    wrap.appendChild(buildCell(cell, i));
  });
}

function buildCell(cell, i) {
  const div = document.createElement('div');
  div.className = 'cell';
  div.id = 'cell-' + cell.id;
  div.draggable = true;
  div.dataset.cellId = cell.id;
  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragover',  onDragOver);
  div.addEventListener('dragleave', onDragLeave);
  div.addEventListener('drop',      onDrop);
  div.addEventListener('dragend',   onDragEnd);
  // タッチデバイス用
  div.addEventListener('touchstart', onTouchStart, { passive: true });
  div.addEventListener('touchmove',  onTouchMove,  { passive: false });
  div.addEventListener('touchend',   onTouchEnd);

  const pc = PLATFORM_CONFIG[cell.platform];

  // 空セル or プレイヤー
  const playerArea = document.createElement('div');
  playerArea.className = 'cell-empty';
  playerArea.onclick = () => focusInput(cell.id);
  playerArea.innerHTML = `<div class="cell-empty-icon">📺</div><div class="cell-empty-text">URLを入力して再生</div>`;
  div.appendChild(playerArea);

  // コントロールバー
  const bar = document.createElement('div');
  bar.className = 'cell-bar';

  // プラットフォームボタン
  const platBtn = document.createElement('button');
  platBtn.className = 'cell-platform-btn';
  platBtn.style.background = pc.bg;
  platBtn.style.color = pc.color;
  platBtn.textContent = pc.label;
  platBtn.onclick = () => togglePlatformSelector(cell.id);

  // プラットフォームセレクター
  const selector = document.createElement('div');
  selector.className = 'platform-selector';
  selector.id = 'ps-' + cell.id;
  Object.entries(PLATFORM_CONFIG).forEach(([key, cfg]) => {
    const item = document.createElement('div');
    item.className = 'ps-item';
    item.innerHTML = `<span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px;background:${cfg.bg};color:${cfg.color}">${cfg.label}</span>${cfg.name}`;
    item.onclick = (e) => { e.stopPropagation(); selectPlatform(cell.id, key); };
    selector.appendChild(item);
  });
  div.appendChild(selector);

  // URL入力
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.type = 'text';
  input.placeholder = 'URLを入力';
  input.id = 'input-' + cell.id;
  input.value = cell.displayName || cell.url || '';
  if (cell.displayName && cell.url) input.title = cell.url;
  input.onkeydown = (e) => { if (e.key === 'Enter') playCell(cell.id); };
  // フォーカス時に元URLを表示して編集できるように
  input.onfocus = () => {
    const c = cells.find(x => x.id === cell.id);
    if (c && c.displayName && c.url && input.value === c.displayName) {
      input.value = c.url;
      input.title = '';
    }
  };
  input.onblur = () => {
    const c = cells.find(x => x.id === cell.id);
    if (c && c.displayName && c.url && input.value === c.url) {
      input.value = c.displayName;
      input.title = c.url;
    }
  };

  // 再生ボタン
  const playBtn = document.createElement('button');
  playBtn.className = 'cell-play-btn';
  playBtn.style.background = pc.color;
  playBtn.textContent = '▶';
  playBtn.onclick = () => playCell(cell.id);



  // チャンネル名表示span（再生後にinputと切替）
  const chName = document.createElement('span');
  chName.className = 'cell-chname';
  chName.id = 'chname-' + cell.id;
  chName.textContent = cell.displayName || '';
  chName.title = cell.url || '';
  chName.style.display = cell.displayName ? 'flex' : 'none';
  chName.onclick = () => {
    chName.style.display = 'none';
    input.style.display = '';
    input.value = '';
    input.focus();
  };


  // displayNameがあればinputを非表示
  if (cell.displayName) input.style.display = 'none';

  bar.appendChild(platBtn);
  bar.appendChild(input);
  bar.appendChild(chName);
  bar.appendChild(playBtn);
  div.appendChild(bar);

  return div;
}

// ───────────────────────────────────────────────
// CELL ACTIONS
// ───────────────────────────────────────────────
function focusInput(id) {
  const el = document.getElementById('input-' + id);
  if (el) el.focus();
}

function togglePlatformSelector(id) {
  // 他を閉じる
  document.querySelectorAll('.platform-selector').forEach(s => {
    if (s.id !== 'ps-' + id) s.classList.remove('open');
  });
  document.getElementById('ps-' + id).classList.toggle('open');
}

function selectPlatform(id, platform) {
  const cell = cells.find(c => c.id === id);
  if (!cell) return;
  cell.platform = platform;
  document.getElementById('ps-' + id).classList.remove('open');
  saveCells();
  renderGrid();
}

function detectPlatform(url) {
  if (/youtube\.com|youtu\.be/i.test(url)) return 'yt';
  if (/twitch\.tv/i.test(url)) return 'tw';
  if (/kick\.com/i.test(url)) return 'kk';
  return null;
}

function playCell(id) {
  const cell = cells.find(c => c.id === id);
  if (!cell) return;
  const input = document.getElementById('input-' + id);
  const raw = input ? input.value.trim() : cell.url;
  if (!raw) return;

  // URLからプラットフォームを自動検出して切替
  const detected = detectPlatform(raw);
  if (detected && detected !== cell.platform) {
    cell.platform = detected;
    // ボタンの色も更新
    const cellEl = document.getElementById('cell-' + id);
    const pc = PLATFORM_CONFIG[detected];
    const platBtn = cellEl.querySelector('.cell-platform-btn');
    platBtn.textContent = pc.label;
    platBtn.style.background = pc.bg;
    platBtn.style.color = pc.color;
    const playBtn = cellEl.querySelector('.cell-play-btn');
    playBtn.style.background = pc.color;
  }

  cell.url = raw;
  saveCells();

  // チャンネル名をURLから抽出して入力欄に表示
  const displayName = extractDisplayName(cell.platform, raw);
  if (displayName) {
    const inputEl = document.getElementById('input-' + id);
    if (inputEl) {
      inputEl.value = displayName;
      inputEl.title = raw; // 元URLをツールチップに保持
    }
    cell.displayName = displayName;
    saveCells();
    // chname spanを更新
    const chnameEl = document.getElementById('chname-' + id);
    if (chnameEl) {
      chnameEl.textContent = displayName;
      chnameEl.title = raw;
      chnameEl.style.display = 'flex';
      const inp = document.getElementById('input-' + id);
      if (inp) inp.style.display = 'none';
    }
  }

  const embedUrl = buildEmbedUrl(cell.platform, raw);
  const cellEl = document.getElementById('cell-' + id);
  const playerArea = cellEl.querySelector('.cell-empty') || cellEl.querySelector('iframe');

  if (!embedUrl && cell.platform !== 'tw') {
    if (cell.platform === 'yt') {
      // YouTubeは動画URL or チャンネルID(UCxxx)が必要
      const msgEl = cellEl.querySelector('.cell-empty') || document.createElement('div');
      msgEl.className = 'cell-empty';
      msgEl.innerHTML = `
        <div style="font-size:22px">▶️</div>
        <div style="font-size:12px;color:var(--yt);font-weight:700">YouTube</div>
        <div style="font-size:11px;color:var(--muted);text-align:center;line-height:1.6;padding:0 8px">
          動画URLを入力してください<br>例: youtube.com/watch?v=xxxxx
        </div>
        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(raw)}" target="_blank"
           style="padding:7px 16px;border-radius:7px;background:var(--yt);color:#fff;font-size:12px;font-weight:700;text-decoration:none;margin-top:4px">
          YouTubeで検索 ↗
        </a>
      `;
      if (!cellEl.querySelector('.cell-empty')) cellEl.insertBefore(msgEl, cellEl.querySelector('.cell-bar'));
    }
    return;
  }

  if (cell.platform === 'tw') {
    // Twitchは外部リンクパネル
    const ch = extractTwitchChannel(raw);
    playerArea.innerHTML = `
      <div style="font-size:22px">🟣</div>
      <div style="font-size:14px;font-weight:700;color:#9147ff">Twitch</div>
      <div style="font-size:13px;opacity:.8">${ch}</div>
      <a href="https://twitch.tv/${ch}" target="_blank" rel="noopener"
         style="margin-top:6px;padding:9px 20px;border-radius:8px;background:#9147ff;color:#fff;font-size:13px;font-weight:700;text-decoration:none">▶ 開く</a>
    `;
    playerArea.onclick = null;
    return;
  }

  // iframe再生
  const iframe = document.createElement('iframe');
  iframe.src = embedUrl;
  iframe.allowFullscreen = true;
  iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
  iframe.style.cssText = 'width:100%;flex:1;border:none;display:block;min-height:0';

  playerArea.replaceWith(iframe);
}


// ───────────────────────────────────────────────
// URL BUILDERS
// ───────────────────────────────────────────────
function buildEmbedUrl(platform, input) {
  if (platform === 'yt') {
    // 動画ID (watch?v= / youtu.be/)
    const vid = extractYouTubeId(input);
    if (vid) return `https://www.youtube.com/embed/${vid}?autoplay=1&rel=0&enablejsapi=1`;

    // チャンネルID (UC...形式) → ライブ埋め込み
    const chId = input.match(/(?:channel\/)?(UC[A-Za-z0-9_-]{22})/);
    if (chId) return `https://www.youtube.com/embed/live_stream?channel=${chId[1]}&autoplay=1`;

    // @ハンドルや/live URLは動画IDが必要 → 外部リンクパネルで対応
    return 'EXTERNAL';
  }
  if (platform === 'tw') return null;
  if (platform === 'kk') {
    const ch = extractKickChannel(input);
    return `https://player.kick.com/${ch}?autoplay=true`;
  }
  return null;
}


function extractDisplayName(platform, url) {
  if (platform === 'yt') {
    // youtu.be/VIDEO_ID
    const short = url.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
    if (short) return short[1];
    // watch?v=
    const vid = url.match(/[?&]v=([A-Za-z0-9_-]{11})/);
    if (vid) return vid[1];
    // /channel/UCxxx
    const ch = url.match(/\/channel\/(UC[A-Za-z0-9_-]+)/);
    if (ch) return ch[1];
    // /@name or /c/name or /user/name
    const at = url.match(/\/@([^/?&#]+)/);
    if (at) return '@' + at[1];
    const c = url.match(/\/(?:c|user)\/([^/?&#]+)/);
    if (c) return c[1];
    // 素のチャンネルID
    if (/^UC[A-Za-z0-9_-]{20,}$/.test(url.trim())) return url.trim();
    return url.trim();
  }
  if (platform === 'tw') {
    const m = url.match(/twitch\.tv\/([^/?&#]+)/);
    return m ? m[1] : url.replace(/https?:\/\//,'').split('/').filter(Boolean).pop();
  }
  if (platform === 'kk') {
    const m = url.match(/kick\.com\/([^/?&#]+)/);
    return m ? m[1] : url.replace(/https?:\/\//,'').split('/').filter(Boolean).pop();
  }
  return url;
}
function extractYouTubeId(s) {
  const m = s.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function extractYouTubeChannel(s) {
  const m = s.match(/youtube\.com\/(?:channel\/|@)([^/?&#]+)/);
  return m ? m[1] : null;
}

function extractTwitchChannel(s) {
  const m = s.match(/twitch\.tv\/([^/?&#]+)/);
  return m ? m[1] : s.replace(/https?:\/\//,'').replace(/twitch\.tv\//,'').split('/')[0].split('?')[0];
}

function extractKickChannel(s) {
  const m = s.match(/kick\.com\/([^/?&#]+)/);
  return m ? m[1] : s.replace(/https?:\/\//,'').replace(/kick\.com\//,'').split('/')[0].split('?')[0];
}




function extractChannelName(platform, url) {
  if (!url) return '';
  if (platform === 'yt') {
    const vid = extractYouTubeId(url);
    if (vid) return url; // 動画IDはそのままURLを短縮表示
    const ch = extractYouTubeChannel(url);
    if (ch) return '@' + ch;
    return url.replace(/^@/, '@').split('?')[0].split('/').pop();
  }
  if (platform === 'tw') return extractTwitchChannel(url);
  if (platform === 'kk') return extractKickChannel(url);
  return url;
}

// ───────────────────────────────────────────────
// DRAG & DROP / TOUCH SORT
// ───────────────────────────────────────────────
let _dragId   = null;
let _touchEl  = null;
let _touchClone = null;
let _touchStartX = 0;
let _touchStartY = 0;

function onDragStart(e) {
  _dragId = e.currentTarget.dataset.cellId;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const target = e.currentTarget;
  if (target.dataset.cellId !== _dragId) target.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  const toId = e.currentTarget.dataset.cellId;
  e.currentTarget.classList.remove('drag-over');
  if (_dragId && toId && _dragId !== toId) swapCells(_dragId, toId);
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('drag-over'));
  _dragId = null;
}

// タッチ操作
function onTouchStart(e) {
  const touch = e.touches[0];
  _touchEl = e.currentTarget;
  _touchStartX = touch.clientX;
  _touchStartY = touch.clientY;
  _dragId = _touchEl.dataset.cellId;

  // クローン作成
  _touchClone = _touchEl.cloneNode(true);
  const r = _touchEl.getBoundingClientRect();
  _touchClone.style.cssText = `
    position:fixed;left:${r.left}px;top:${r.top}px;
    width:${r.width}px;height:${r.height}px;
    opacity:.7;pointer-events:none;z-index:999;
    border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.5);
  `;
  document.body.appendChild(_touchClone);
  _touchEl.classList.add('dragging');
}

function onTouchMove(e) {
  if (!_touchClone) return;
  e.preventDefault();
  const touch = e.touches[0];
  const dx = touch.clientX - _touchStartX;
  const dy = touch.clientY - _touchStartY;
  const r = _touchEl.getBoundingClientRect();
  _touchClone.style.left = (r.left + dx) + 'px';
  _touchClone.style.top  = (r.top  + dy) + 'px';

  // ホバー中のセルをハイライト
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('drag-over'));
  _touchClone.style.display = 'none';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  _touchClone.style.display = '';
  const target = el && el.closest('.cell');
  if (target && target.dataset.cellId !== _dragId) target.classList.add('drag-over');
}

function onTouchEnd(e) {
  if (!_touchClone) return;
  const touch = e.changedTouches[0];
  _touchClone.style.display = 'none';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const target = el && el.closest('.cell');
  if (target && target.dataset.cellId !== _dragId) swapCells(_dragId, target.dataset.cellId);

  _touchClone.remove();
  _touchClone = null;
  if (_touchEl) _touchEl.classList.remove('dragging');
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('drag-over'));
  _touchEl = null;
  _dragId = null;
}

function swapCells(fromId, toId) {
  const fi = cells.findIndex(c => c.id === fromId);
  const ti = cells.findIndex(c => c.id === toId);
  if (fi < 0 || ti < 0) return;

  // cellsデータを入れ替え
  [cells[fi], cells[ti]] = [cells[ti], cells[fi]];
  saveCells();

  // DOMを直接入れ替え（iframeを保持するため再レンダリングしない）
  const wrap = document.getElementById('grid-wrap');
  const fromEl = document.getElementById('cell-' + fromId);
  const toEl   = document.getElementById('cell-' + toId);
  if (!fromEl || !toEl) return;

  // プレースホルダーを使って確実に入れ替え
  const placeholder = document.createElement('div');
  wrap.insertBefore(placeholder, fromEl);
  wrap.insertBefore(fromEl, toEl);
  wrap.insertBefore(toEl, placeholder);
  placeholder.remove();
}

// ───────────────────────────────────────────────
// CLOSE SELECTORS ON OUTSIDE CLICK
// ───────────────────────────────────────────────
document.addEventListener('click', () => {
  document.querySelectorAll('.platform-selector').forEach(s => s.classList.remove('open'));
});

// ───────────────────────────────────────────────
// INIT
// ───────────────────────────────────────────────
renderGrid();
</script>
</body>
</html>
